name: Deploy to Render

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  build-scan-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Deployment Info
        run: |
          echo '[{"sha":"${{ github.sha }}","branch":"${{ github.ref_name }}","timestamp":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'","commit_message":"'"$(git log -1 --format=%s | sed 's/"/\\"/g')"'Format"}]' > deployments.json
          cat deployments.json

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/pulseapi:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/pulseapi:sha-${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build and Push Tags to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pulseapi:latest
            ghcr.io/${{ github.repository_owner }}/pulseapi:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Webhook
        run: |
          curl -f -X GET "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        
      - name: Verify Live Endpoint Health
        run: |
          echo "Waiting 60s for Render deployment propagation..."
          sleep 60
          for i in {1..12}; do
            echo "Checking /health endpoint (Attempt $i/12)..."
            RESPONSE=$(curl -s -w "%{http_code}" -o /dev/null https://pulseapi-zu03.onrender.com/health)
            if [ "$RESPONSE" -eq 200 ]; then
              echo "Deployment is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed or timed out!"
          exit 1
